<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="quiz-container">
        <h1>JS Quiz</h1>
        <div id="question-container">
            <p id="question"></p>
            <div id="option-container">
                <button class="option-btn" id="option1" title="btn"></button>
                <button class="option-btn" id="option2" title="btn"></button>
                <button class="option-btn" id="option3" title="btn"></button>
                <button class="option-btn" id="option4" title="btn"></button>
            </div>
        </div>
        <button id="next-btn">Next</button>
        <div id="score-container">
            <h2>Your Score : <span id="score"></span></h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
