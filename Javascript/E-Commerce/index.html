<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Commerce</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Minimal style so cart items look readable — you can keep your style.css as is */
      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }
      .card {
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 6px;
        background: #fafafa;
      }
      .card img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        display: block;
        margin-bottom: 8px;
      }
      #cart {
        margin-top: 20px;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
      }
      #cartItems {
        margin-top: 12px;
        display: flex;
        /* flex-direction: column; */
        gap: 8px;
      }
      .cart-item {
        display: flex;
        gap: 8px;
        align-items: center;
        border: 1px solid #eee;
        padding: 8px;
        border-radius: 6px;
      }
      .cart-item img {
        width: 80px;
        height: 60px;
        object-fit: cover;
        border-radius: 4px;
      }
      .cart-info {
        flex: 1;
      }
      .cartItemCard {
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 6px;
        background: #fafafa;
        display: flex;
        flex-direction: column;
        width: 220px;
      }

      .cartItemCard img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        border-radius: 4px;
        margin-bottom: 8px;
      }

      .cartItemCard button {
        margin-top: 8px;
        padding: 5px 8px;
      }
    </style>
  </head>

  <body>
    <h2>Add Product</h2>
    <div id="error"></div>

    <form id="productForm">
      <input type="text" id="name" placeholder="Product Name" /><br /><br />
      <input type="number" id="price" placeholder="Price" /><br /><br />
      <input type="text" id="category" placeholder="Category" /><br /><br />
      <input type="file" title="Image" id="image" /><br /><br />
      <textarea id="description" placeholder="Description"></textarea
      ><br /><br />
      <button type="submit">Add Product</button>
    </form>

    <hr />

    <div id="productGrid" class="grid"></div>

    <hr />
    <div id="cart">
      <strong>CART</strong>
      <div style="margin-top: 8px">
        Total Products: <span id="totalProducts">0</span> | Total Price: ₹
        <span id="totalPrice">0</span>
      </div>

      <div id="cartItems"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
