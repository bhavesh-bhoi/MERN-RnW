<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD Operations with JSON using LocalStorage</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app-shell">
      <div class="app-header">
        <h2>Manage Students</h2>
        <div class="badge">
          <span class="badge-dot"></span>
          LocalStorage · JSON
        </div>
      </div>

      <hr />

      <div class="form-row">
        <div class="field">
          <label for="name">Name</label>
          <input
            type="text"
            name="name"
            id="name"
            title="name"
            placeholder="Enter student name"
          />
        </div>

        <div class="field">
          <label for="age">Age</label>
          <input
            type="number"
            name="age"
            id="age"
            title="age"
            placeholder="Enter age"
          />
        </div>

        <button onclick="addStudent()" class="btn-primary">Add</button>
      </div>

      <div class="section-title">Students List</div>

      <table id="studentsTable">
        <tr>
          <th>Index</th>
          <th>Name</th>
          <th>Age</th>
          <th>Action</th>
        </tr>
      </table>
    </div>

    <!-- Edit Modal -->
    <div class="modal-backdrop" id="editModalBackdrop">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Edit Student</div>
          <button class="modal-close" onclick="closeEditModal()">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="editName">Name</label>
            <input type="text" id="editName" placeholder="Enter new name" />
          </div>
          <div class="field">
            <label for="editAge">Age</label>
            <input type="number" id="editAge" placeholder="Enter new age" />
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-outline" onclick="closeEditModal()">Cancel</button>
          <button class="btn-success" onclick="saveEdit()">Save</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
  </body>
</html>
